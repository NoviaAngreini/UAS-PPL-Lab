<!DOCTYPE html>
<html>

<head>
    <title>Concert Ticket Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
        }

        .navbar {
            background: #0f172a;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #22c55e;
        }

        .menu a {
            text-decoration: none;
            color: white;
            margin-left: 25px;
            font-weight: bold;
        }

        .menu a:hover {
            color: #22c55e;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.6),
                    rgba(0, 0, 0, 0.6)),
                url('https://images.unsplash.com/photo-1501386761578-eac5c94b800a');
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 22px;
            color: #ddd;
        }

        .konser-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 50px;
        }

        .card {
            background: #1e293b;
            width: 280px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .poster {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
        }

        .judul {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .artis {
            color: #22c55e;
            margin-bottom: 10px;
        }

        .harga {
            font-size: 20px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #16a34a;
        }

        .admin-btn {
            background: #22c55e;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .admin-btn:hover {
            background: #16a34a;
            color: white !important;
        }
    </style>

</head>

<body>

    <div class="navbar">
        <div class="logo">Concert Ticket Hub</div>

        <div class="menu">
            <a href="/">Home</a>
            <a href="/konser/">Konser</a>
            <a href="/kontak/">Kontak</a>
            <a href="/admin/" class="admin-btn">Dashboard Admin</a>
        </div>
    </div>

    <div class="hero">
        <h1>Festival Musik Terbesar 2026</h1>
        <p>Pesan tiket konser favoritmu dengan mudah dan cepat</p>
    </div>

    <div class="konser-container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f" class="poster">

            <div class="card-content">
                <div class="judul">Summer Music Fest</div>
                <div class="artis">Sheila On 7</div>
                <div class="harga">Rp 350.000</div>

                <a href="/konser/1/" class="btn">Lihat Detail</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2" class="poster">

            <div class="card-content">
                <div class="judul">Rock Nation</div>
                <div class="artis">NOAH</div>
                <div class="harga">Rp 500.000</div>

                <a href="/konser/2/" class="btn">Lihat Detail</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81" class="poster">

            <div class="card-content">
                <div class="judul">Jazz Night</div>
                <div class="artis">Tulus</div>
                <div class="harga">Rp 275.000</div>

                <a href="/konser/3/" class="btn">Lihat Detail</a>
            </div>
        </div>

    </div>

</body>

</html>
