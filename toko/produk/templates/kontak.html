<!DOCTYPE html>
<html>

<head>
    <title>Hubungi Kami</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
        }

        .navbar {
            background: #0f172a;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #22c55e;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .menu a:hover {
            color: #22c55e;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }

        .contact-card {
            background: #1e293b;
            width: 550px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .4);
        }

        .title {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        .info {
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

    <div class="navbar">

        <div class="logo">Concert Ticket Hub</div>

        <div class="menu">
            <a href="/">Home</a>
            <a href="/konser/">Konser</a>
            <a href="/kontak/">Kontak</a>
        </div>

    </div>

    <div class="container">

        <div class="contact-card">

            <h1 class="title">Hubungi Kami 🎵</h1>

            <p class="subtitle">
                Tim kami siap membantu terkait pemesanan tiket dan informasi konser.
            </p>

            <div class="info">
                📧 support@concerttickethub.com
            </div>

            <div class="info">
                📱 0812-3456-7890
            </div>

            <div class="info">
                📍 Banda Aceh, Indonesia
            </div>

            <div class="info">
                🕒 Senin - Jumat (08.00 - 17.00 WIB)
            </div>

            <a href="/" class="btn">
                Kembali ke Home
            </a>

        </div>

    </div>

</body>

</html>
